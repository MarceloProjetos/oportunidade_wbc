version: '3.8'

services:
  sap-extractor:
    build: .
    container_name: sap-to-supabase
    environment:
      - SAP_HOST=${SAP_HOST}
      - SAP_PORT=${SAP_PORT:-30015}
      - SAP_USER=${SAP_USER}
      - SAP_PASSWORD=${SAP_PASSWORD}
      - SAP_DATABASE=${SAP_DATABASE}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - TABLE_NAME=oportunidades
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    
    # Para executar agendadamente, descomente e configure:
    # command: python scheduled_execution.py
    
    # Ou execute uma única vez:
    command: python extract_sap_to_supabase.py
